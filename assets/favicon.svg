<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" fill="#000811"/>

  <!-- Outer targeting ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.6"/>

  <!-- Crosshair ticks -->
  <line x1="16" y1="2"  x2="16" y2="6"  stroke="#00ff88" stroke-width="0.9"/>
  <line x1="16" y1="26" x2="16" y2="30" stroke="#00ff88" stroke-width="0.9"/>
  <line x1="2"  y1="16" x2="6"  y2="16" stroke="#00ff88" stroke-width="0.9"/>
  <line x1="26" y1="16" x2="30" y2="16" stroke="#00ff88" stroke-width="0.9"/>

  <!-- Inner ring -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="#00ff88" stroke-width="0.6" opacity="0.4"/>

  <!-- Polygonal ship — nose pointing up -->
  <!-- Main body -->
  <polygon points="16,5 20,14 18,16 16,15 14,16 12,14" fill="#00ccff" opacity="0.9"/>
  <!-- Wings -->
  <polygon points="12,14 8,20 11,19 14,16" fill="#0088cc" opacity="0.9"/>
  <polygon points="20,14 24,20 21,19 18,16" fill="#0088cc" opacity="0.9"/>
  <!-- Engine glow -->
  <polygon points="14,16 16,15 18,16 17,19 15,19" fill="#ff6600" opacity="0.85"/>
  <polygon points="15,19 17,19 16,22" fill="#ffaa00" opacity="0.7"/>

  <!-- Engine exhaust dot -->
  <circle cx="16" cy="22" r="1" fill="#ffcc44" opacity="0.6"/>

  <!-- Corner bracket marks — targeting UI feel -->
  <polyline points="3,7 3,3 7,3"   fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.5"/>
  <polyline points="25,3 29,3 29,7" fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.5"/>
  <polyline points="3,25 3,29 7,29" fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.5"/>
  <polyline points="25,29 29,29 29,25" fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.5"/>
</svg>
